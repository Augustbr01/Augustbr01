<svg width="900" height="380" viewBox="0 0 900 380" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: 'Cascadia Code', 'Consolas', 'Menlo', 'DejaVu Sans Mono', monospace; }
  .t1 { animation: w1 1.1s steps(24,end) 0.4s forwards; }
  @keyframes w1 { to { width: 251px; } }
  .t2 { animation: w2 1.2s steps(30,end) 3.5s forwards; }
  @keyframes w2 { to { width: 312px; } }
  .name { stroke-dasharray: 1200; stroke-dashoffset: 1200; fill-opacity: 0;
          animation: draw 1.5s ease 1.4s forwards, fillin 0.9s ease 2.5s forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes fillin { to { fill-opacity: 1; } }
  .tag { opacity: 0; animation: rise 0.7s cubic-bezier(.2,.8,.2,1) 3s forwards; }
  .chip { opacity: 0; animation: rise 0.55s cubic-bezier(.2,.9,.3,1.3) forwards; }
  .c1 { animation-delay: 4.9s; } .c2 { animation-delay: 5.15s; } .c3 { animation-delay: 5.4s; }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .cursor { opacity: 0; animation: blink 1.1s steps(1) 4.8s infinite; }
  @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  .sheen { transform: translateX(-180px); animation: sweep 7s ease-in-out 5.5s infinite; }
  @keyframes sweep { 0% { transform: translateX(-180px); } 35% { transform: translateX(960px); } 100% { transform: translateX(960px); } }
</style>
<defs>
  <clipPath id="l1"><rect class="t1" x="60" y="88" width="0" height="26"/></clipPath>
  <clipPath id="l2"><rect class="t2" x="60" y="246" width="0" height="26"/></clipPath>
  <clipPath id="win"><rect x="20" y="20" width="860" height="340" rx="14"/></clipPath>
  <linearGradient id="sheenG" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#c0caf5" stop-opacity="0"/>
    <stop offset="0.5" stop-color="#c0caf5" stop-opacity="0.06"/>
    <stop offset="1" stop-color="#c0caf5" stop-opacity="0"/>
  </linearGradient>
</defs>
<rect x="20" y="20" width="860" height="340" rx="14" fill="#1a1b26" stroke="#3b4261" stroke-width="1.5"/>
<circle cx="48" cy="46" r="6" fill="#f7768e"/>
<circle cx="70" cy="46" r="6" fill="#e0af68"/>
<circle cx="92" cy="46" r="6" fill="#9ece6a"/>
<text x="450" y="51" text-anchor="middle" font-size="14" fill="#565f89">augusto@brazil: ~</text>
<line x1="20" y1="66" x2="880" y2="66" stroke="#3b4261" stroke-width="1"/>
<text x="60" y="107" font-size="17" clip-path="url(#l1)" textLength="251" lengthAdjust="spacing"><tspan fill="#9ece6a">augusto@brazil</tspan><tspan fill="#565f89">:~$</tspan><tspan fill="#c0caf5"> whoami</tspan></text>
<text class="name" x="60" y="185" font-size="52" font-weight="800" fill="#c0caf5" stroke="#7aa2f7" stroke-width="1.4" textLength="560" lengthAdjust="spacing">AUGUSTO CORRÊA</text>
<text class="tag" x="60" y="219" font-size="16" fill="#7aa2f7">// building secure solutions with the right stack</text>
<text x="60" y="265" font-size="17" clip-path="url(#l2)" textLength="312" lengthAdjust="spacing"><tspan fill="#9ece6a">augusto@brazil</tspan><tspan fill="#565f89">:~$</tspan><tspan fill="#c0caf5"> status --right-now</tspan></text>
<rect class="cursor" x="380" y="250" width="9" height="18" fill="#7aa2f7"/>
<g class="chip c1">
  <rect x="60" y="286" width="226" height="32" rx="7" fill="#24283b" stroke="#3b4261"/>
  <text x="173" y="307" text-anchor="middle" font-size="14" fill="#c0caf5">SWE @ UNIGRAN · 4th sem</text>
</g>
<g class="chip c2">
  <rect x="298" y="286" width="150" height="32" rx="7" fill="#24283b" stroke="#3b4261"/>
  <text x="373" y="307" text-anchor="middle" font-size="14" fill="#bb9af7">CS50 · Harvard</text>
</g>
<g class="chip c3">
  <rect x="460" y="286" width="176" height="32" rx="7" fill="#24283b" stroke="#3b4261"/>
  <text x="548" y="307" text-anchor="middle" font-size="14" fill="#9ece6a">19y · MS · Brazil</text>
</g>
<g clip-path="url(#win)"><rect class="sheen" x="0" y="20" width="160" height="340" fill="url(#sheenG)"/></g>
</svg>