<svg width="900" height="46" viewBox="0 0 900 46" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: 'Cascadia Code', 'Consolas', 'Menlo', 'DejaVu Sans Mono', monospace; }
  .t { animation: w 0.9s steps(28,end) 0.3s forwards; }
  @keyframes w { to { width: 325px; } }
  .cursor { animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  .sweep { transform: translateX(-170px); animation: sw 4.5s ease-in-out 1.4s infinite; }
  @keyframes sw { 0% { transform: translateX(-170px); } 60% { transform: translateX(910px); } 100% { transform: translateX(910px); } }
</style>
<defs>
  <clipPath id="c"><rect class="t" x="34" y="8" width="0" height="26"/></clipPath>
  <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#7aa2f7" stop-opacity="0"/>
    <stop offset="0.5" stop-color="#7aa2f7" stop-opacity="0.9"/>
    <stop offset="1" stop-color="#7aa2f7" stop-opacity="0"/>
  </linearGradient>
</defs>
<text x="8" y="27" font-size="20" font-weight="700" fill="#9ece6a">&#10095;</text>
<text x="34" y="27" font-size="19" font-weight="700" fill="#c0caf5" clip-path="url(#c)" textLength="319" lengthAdjust="spacing">git log --featured --oneline</text>
